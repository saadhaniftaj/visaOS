<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0A0A0F"/>
  <!-- Grid Pattern -->
  <g opacity="0.03" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="800" y2="0"/>
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="0" y1="0" x2="0" y2="600"/>
    <line x1="80" y1="0" x2="80" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="560" y1="0" x2="560" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/>
  </g>
  <!-- Cross pattern -->
  <g opacity="0.05" fill="white">
    <rect x="198" y="148" width="4" height="12"/>
    <rect x="194" y="152" width="12" height="4"/>
    <rect x="398" y="248" width="4" height="12"/>
    <rect x="394" y="252" width="12" height="4"/>
    <rect x="598" y="348" width="4" height="12"/>
    <rect x="594" y="352" width="12" height="4"/>
    <rect x="298" y="448" width="4" height="12"/>
    <rect x="294" y="452" width="12" height="4"/>
    <rect x="498" y="98" width="4" height="12"/>
    <rect x="494" y="102" width="12" height="4"/>
  </g>
  <!-- Gradient orbs -->
  <circle cx="200" cy="200" r="200" fill="url(#orb1)" opacity="0.15"/>
  <circle cx="600" cy="400" r="250" fill="url(#orb2)" opacity="0.10"/>
  <defs>
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#635BFF"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0A2FFF"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
